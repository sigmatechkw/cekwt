  '/api/v1/ecommerce/product-categories/{id}/products':
    get:
      summary: 'Get products by category'
      operationId: getProductsByCategory
      description: ''
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  data:
                    -
                      id: 1322
                      slug: blue-one-classic-cap
                      name: 'Blue ONE Classic Cap'
