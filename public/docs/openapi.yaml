                  example: 'e.g: John'
                  nullable: true
                last_name:
                  type: string
                  description: 'This field is required when <code>name</code> is not present. يجب أن لا يتجاوز طول نّص حقل value 120 حروفٍ/حرفًا. يجب أن يكون طول نص حقل value على الأقل 2 حروفٍ/حرفًا.'
                  example: 'e.g: Smith'
                  nullable: true
                name:
                  type: string
                  description: 'The name of the user.'
                  example: omnis
                  nullable: true
                email:
                  type: string
                  description: 'The email of the user.'
                  example: zoila61@example.org
                  nullable: false
                password:
                  type: string
                  description: 'The password of user to create.'
                  example: 'B\C=@[2D1'
                  nullable: false
                phone:
                  type: string
                  description: 'The phone of the user.'
                  example: omnis
                  nullable: true
                password_confirmation:
                  type: string
                  description: 'The password confirmation.'
                  example: aspernatur
                  nullable: false
              required:
                - name
                - email
                - password
                - phone
                - password_confirmation
